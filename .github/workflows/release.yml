name: Github publication

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Read and validate release version
        run: |
          VERSION=$(bash ./mvnw --batch-mode help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "Release tag '$GITHUB_REF_NAME' must match Maven version 'v$VERSION'."
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build release JAR with Maven
        run: bash ./mvnw --batch-mode clean package -DskipTests -Dquarkus.package.jar.type=uber-jar

      - name: Prepare release asset
        run: |
          SOURCE="target/navifinance-${VERSION}-runner.jar"
          TARGET="target/NaviFinance-${VERSION}.jar"
          test -f "$SOURCE"
          mv "$SOURCE" "$TARGET"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: NaviFinance ${{ github.ref_name }}
          body_path: ./CHANGELOG.md
          draft: false
          prerelease: false
          files: ./target/NaviFinance-${{ env.VERSION }}.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/main/docker/Dockerfile.jvm
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/navi-finance:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/navi-finance:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/navi-finance:latest
            ghcr.io/${{ github.repository_owner }}/navi-finance:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
