name: Github publication

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradlew executable
        run: chmod +x gradlew

      - name: Set Environment Variables from Gradle
        run: ./gradlew printEnv

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: NaviDiscounts ${{ env.VERSION }}
          body_path: ./RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: ./build/libs/NaviDiscounts-${{ env.VERSION }}.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/navi-finance:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/navi-finance:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/navi-finance:latest
            ghcr.io/${{ github.repository_owner }}/navi-finance:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max