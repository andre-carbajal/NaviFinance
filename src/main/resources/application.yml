quarkus:
  datasource:
    db-kind: postgresql
    jdbc:
      url: ${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/finance}
    username: ${QUARKUS_DATASOURCE_USERNAME:finance}
    password: ${QUARKUS_DATASOURCE_PASSWORD:finance}
  hibernate-orm:
    schema-management:
      strategy: none
  flyway:
    migrate-at-start: true
  rest-client:
    ollama-api:
      url: ${OLLAMA_BASE_URL:http://localhost:11434}
      connect-timeout: ${OLLAMA_CONNECT_TIMEOUT:5000}
      read-timeout: ${OLLAMA_READ_TIMEOUT:60000}
telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

ollama:
  model: ${OLLAMA_MODEL:qwen3-vl:2b-instruct}
